<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAT - The Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>Welcome to SWAT!</h1>
    <p>A game by Trevor.</p>

    <div id="chess-timer">
        <div id="defense-timer" class="timer-side active-blue">
            <span>DEFENSE</span>
            <div class="time-display">17:00</div>
        </div>
        <div id="timer-controls">
            <button id="toggle-timer-btn">▶️ Resume</button>
            <div id="turn-counter">Turn: 1</div>
        </div>
        <div id="attack-timer" class="timer-side">
            <span>ATTACK</span>
            <div class="time-display">12:00</div>
        </div>
    </div>

    <div class="lobby-controls">
        <button id="copy-link-btn">🔗 Copy Share Link</button>
        <span id="link-status">Connecting to network...</span>
    </div>

    <div class="main-game-layout">
        <div class="guide-sidebar-wrapper">
            <div id="mini-map-container">
                <div id="mini-map-title">SHARED MINI-MAP</div>
                <div id="mini-map"></div>
            </div>
            <div class="guide-panel">
                <div class="guide-header">DEFENSE</div>
                <div class="guide-body">
                    <div class="guide-column left-info">
                        <ul>
                            <li><strong>Move:</strong> 1 Action Point</li>
                            <li><strong>Shoot 3 Spaces:</strong> 1 Action Point</li>
                            <li><strong>Knife:</strong> 1 Action Point</li>
                        </ul>
                    </div>
                    <div class="guide-column right-bars">
                        <div class="bars-header">ACTIONS</div>
                        <div class="action-bar d-light"></div>
                        <div class="action-bar d-light"></div>
                        <div class="action-bar d-light"></div>
                        <div class="action-bar d-dark"></div>
                        <div class="action-bar d-dark"></div>
                        <div class="action-bar d-dark"></div>
                        <div class="action-bar a-orange"></div>
                        <div class="action-bar a-orange"></div>
                        <div class="action-bar a-orange"></div>
                        <div class="action-bar a-red"></div>
                        <div class="action-bar a-red"></div>
                        <div class="action-bar a-red"></div>
                    </div>
                </div>
            </div>
        </div>
        <div id="game-board"></div>
        <div class="sidebar-panel">
            <h3>Supply Depot</h3>
            <div id="supply-grid"></div>
            <div id="trash-bin">🗑️ Trash</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.5/dist/peerjs.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
