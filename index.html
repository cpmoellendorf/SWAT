<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAT - The Game</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com"></script>
</head>
<body>

    <h1>Welcome to SWAT!</h1>
    <p>This is an extremely simple digital rendition of Trevor's game, SWAT.</p>

    <!-- WRAPPER LAYOUT CONTAINER -->
    <div class="main-game-layout">

    <!-- Left-Hand Sidebar Guide Card -->
    <div class="guide-sidebar-wrapper">
        <div class="guide-panel">
            <div class="guide-header">DEFENSE</div>
            <div class="guide-body">
                <div class="guide-column left-info">
                    <ul>
                        <li><strong>Move:</strong> 1 Action Point</li>
                        <li><strong>Shoot 3 Spaces:</strong> 1 Action Point</li>
                        <li><strong>Knife:</strong> 1 Action Point</li>
                    </ul>
                </div>
                <div class="guide-column right-bars">
                    <div class="bars-header">ACTIONS</div>
                    <div class="action-bar light"></div>
                    <div class="action-bar light"></div>
                    <div class="action-bar light"></div>
                    <div class="action-bar dark">SCAN ONLY</div>
                </div>
            </div>
        </div>
    </div>
        
        <!-- Your original 16x11 board -->
        <div id="game-board"></div>

        <!-- NEW SIDEBAR CONTROL PANEL -->
        <div class="sidebar-panel">
            <h3>Supply Depot</h3>
            <div id="supply-grid"></div>
            
            <div id="trash-bin">🗑️ Trash</div>
        </div>

    </div>

    <script src="js/script.js"></script>
</body>
</html>
