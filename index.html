<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAT - The Game</title>
    <style>
body {
  background-color: #1a1a1a;
  color: #ffffff;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  margin: 0;
}

/* ==========================================================================
   MINI-MAP (Shared Board)
   ========================================================================== */
#mini-map-container {
  position: absolute;
  top: 15px;
  left: 15px;
  background-color: #222222;
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #444444;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  z-index: 100;
  display: block; /* Explicitly visible for both players */
}

#mini-map-title {
  font-size: 0.75rem;
  font-weight: bold;
  color: #ffffff;
  margin-bottom: 4px;
  text-align: center;
  letter-spacing: 1px;
}

#mini-map {
  display: grid;
  grid-template-columns: repeat(16, 1fr);
  grid-template-rows: repeat(11, 1fr);
  width: 380px;
  height: 265px;
  gap: 1px;
  background-color: #444444;
}

#mini-map .cell {
  background-color: #ffffff;
  max-width: none;
  max-height: none;
}

#mini-map .cell:hover {
  background-color: #3a3a3a;
}

#mini-map .label {
  background-color: #111111;
  font-size: 0.55rem;
}

#mini-map .token {
  flex-basis: 10px;
  width: 10px;
  height: 10px;
  max-width: 10px;
  max-height: 10px;
}

/* Keep mini-map token scaling balanced */
#mini-map .cell:has(.token:nth-child(2)) .token {
  flex-basis: 6px;
  width: 6px;
  height: 6px;
  max-width: 6px;
  max-height: 6px;
}

/* ==========================================================================
   GAME BOARD
   ========================================================================== */

#game-board {
  display: grid;
  grid-template-columns: repeat(16, 1fr);
  grid-template-rows: repeat(11, 1fr);
  width: 640px;
  height: 440px;
  gap: 2px;
  background-color: #f6f6f6;
  margin-top: 20px;
}

.cell {
  background-color: #ffffff;
  width: 100%;
  height: 100%;
  cursor: pointer;
  position: relative;

  /* Flex layout for stacked tokens */
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 1px;
  padding: 1px;
  box-sizing: border-box;

  /* Prevent cells from growing or resizing */
  max-width: 38.125px;
  max-height: 38.18px;
  overflow: hidden;
}

.cell:hover {
  background-color: #e0e0e0;
}

/* Static tracking edge labels (A–O and 1–10) */
.label {
  background-color: #222222;
  color: #ffffff;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: sans-serif;
  font-size: 0.9rem;
  user-select: none;
  width: 100%;
  height: 100%;
}

/* ==========================================================================
   WALLS (Solid black lines drawn into the 2px grid gaps)
   ========================================================================== */

.cell[data-wall-right="true"]::after {
  content: "";
  position: absolute;
  top: -2px;
  right: -2px;
  width: 2px;
  height: calc(100% + 4px);
  background-color: #000000;
  z-index: 10;
}

.cell[data-wall-bottom="true"]::before {
  content: "";
  position: absolute;
  left: -2px;
  bottom: -2px;
  height: 2px;
  width: calc(100% + 4px);
  background-color: #000000;
  z-index: 10;
}

/* ==========================================================================
   WINDOWS (Brown dashed lines drawn into the 2px grid gaps)
   ========================================================================== */

.cell[data-window-right="true"]::after {
  content: "";
  position: absolute;
  top: -2px;
  right: -2px;
  width: 2px;
  height: calc(100% + 4px);
  border-right: 2px dashed #8B4513;
  z-index: 15;
}

.cell[data-window-bottom="true"]::before {
  content: "";
  position: absolute;
  left: -2px;
  bottom: -2px;
  height: 2px;
  width: calc(100% + 4px);
  border-bottom: 2px dashed #8B4513;
  z-index: 15;
}

/* ==========================================================================
   TOKENS
   ========================================================================== */

.token {
  border-radius: 50%;
  background-color: #21781e;
  z-index: 5;
  user-select: none;
  cursor: grab;

  flex-grow: 0;
  flex-shrink: 1;
  flex-basis: 26px;
  width: 26px;
  height: 26px;
  max-width: 26px;
  max-height: 26px;
}

/* Two tokens in a cell: shrink to 16px */
.cell:has(.token:nth-child(2)) .token {
  flex-basis: 16px;
  width: 16px;
  height: 16px;
  max-width: 16px;
  max-height: 16px;
}

/* Three or more tokens in a cell: shrink to 11px */
.cell:has(.token:nth-child(3)) .token {
  flex-basis: 11px;
  width: 11px;
  height: 11px;
  max-width: 11px;
  max-height: 11px;
}

/* Prevent child elements from intercepting drag events */
.token * { pointer-events: none; }
.token   { pointer-events: auto; }

/* Player color variants */
.token.light-blue { background-color: #00b4d8; }
.token.dark-blue  { background-color: #070bce; }
.token.pink       { background-color: #ff85a1; }
.token.red        { background-color: #d90429; }

/* Drag states */
.token:active   { cursor: grabbing; }
.token.dragging { opacity: 0.4; }

/* ==========================================================================
   LAYOUT
   ========================================================================== */

.main-game-layout {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 40px;
  margin-top: 20px;
  flex-wrap: nowrap;
}

.guide-sidebar-wrapper {
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 480px;
}

.sidebar-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: sans-serif;
}

/* ==========================================================================
   SUPPLY DEPOT
   ========================================================================== */

#supply-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-template-rows: repeat(5, 1fr);
  width: 100px;
  height: 250px;
  gap: 2px;
  background-color: #333333;
}

.supply-slot {
  background-color: #222222;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
}

#trash-bin {
  margin-top: 30px;
  width: 100px;
  height: 50px;
  background-color: #9b2226;
  color: #ffffff;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  cursor: pointer;
  border: 2px solid #ae2012;
  user-select: none;
}

#trash-bin:hover {
  background-color: #ae2012;
}

/* ==========================================================================
   GUIDE CARD (Tactical Cheat Sheet)
   ========================================================================== */

.guide-panel {
  width: 260px;
  height: 240px;
  background-color: #222222;
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
  font-family: sans-serif;
  user-select: none;
  pointer-events: none;
}

.guide-header {
  background-color: #00b4d8;
  color: #1a1a1a;
  font-weight: bold;
  text-align: center;
  padding: 12px;
  font-size: 1.1rem;
  letter-spacing: 2px;
}

.guide-body {
  display: flex;
  flex-direction: row;
  height: 100%;
  padding: 15px 10px;
  gap: 10px;
}

.guide-column {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.guide-column.left-info ul {
  list-style-type: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.guide-column.left-info li {
  color: #e0e0e0;
  font-size: 0.85rem;
  line-height: 1.3;
}

.guide-column.left-info strong {
  color: #00b4d8;
  display: block;
}

.guide-column.right-bars {
  justify-content: flex-start;
  gap: 14px;
  padding-top: 4px;
}

.bars-header {
  color: #00b4d8;
  font-weight: bold;
  font-size: 0.8rem;
  letter-spacing: 1px;
  text-align: center;
  margin-bottom: -5px;
  border-bottom: 1px solid #333333;
  padding-bottom: 4px;
}

.action-bar {
  height: 24px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: bold;
}

.action-bar.light {
  background-color: #00b4d8;
  opacity: 0.6;
}

.action-bar.dark {
  background-color: #070bce;
  color: #ffffff;
  letter-spacing: 1px;
}

/* ==========================================================================
   GUIDE CARD — ATTACK VARIANT
   ========================================================================== */

.guide-panel.attack .guide-header {
  background-color: #f77f00;
  color: #ffffff;
}

.guide-panel.attack .guide-column.left-info strong,
.guide-panel.attack .bars-header {
  color: #f77f00;
}

.guide-panel.attack .action-bar.light {
  background-color: #f77f00;
  opacity: 0.6;
}

.guide-panel.attack .action-bar.dark {
  display: none;
}
    </style>
</head>
<body>

    <div id="mini-map-container">
        <div id="mini-map-title">SHARED MINI-MAP</div>
        <div id="mini-map"></div>
    </div>

    <h1>Welcome to SWAT!</h1>
    <p>This is an extremely simple digital rendition of Trevor's game, SWAT.</p>

    <div class="lobby-controls">
        <button id="copy-link-btn">🔗 Copy Share Link</button>
        <span id="link-status">Connecting to network...</span>
    </div>

    <div class="main-game-layout">

        <div class="guide-sidebar-wrapper">
            <div class="guide-panel">
                <div class="guide-header">DEFENSE</div>
                <div class="guide-body">
                    <div class="guide-column left-info">
                        <ul>
                            <li><strong>Move:</strong> 1 Action Point</li>
                            <li><strong>Shoot 3 Spaces:</strong> 1 Action Point</li>
                            <li><strong>Knife:</strong> 1 Action Point</li>
                        </ul>
                    </div>
                    <div class="guide-column right-bars">
                        <div class="bars-header">ACTIONS</div>
                        <div class="action-bar light"></div>
                        <div class="action-bar light"></div>
                        <div class="action-bar light"></div>
                        <div class="action-bar dark">SCAN ONLY</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="game-board"></div>

        <div class="sidebar-panel">
            <h3>Supply Depot</h3>
            <div id="supply-grid"></div>
            <div id="trash-bin">🗑️ Trash</div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.5/dist/peerjs.min.js"></script>
    <script>
window.addEventListener('load', function() {

  // ==========================================================================
  // GLOBALS
  // ==========================================================================
  const letters = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N','O'];
  const board = document.getElementById('game-board');
  const miniMap = document.getElementById('mini-map');
  const columns = 16;
  const rows = 11;
  const totalCells = columns * rows;

  let peer = null;
  let connection = null;
  let draggedToken = null;
  let isSupplyToken = false;

  let targetPeerId = window.location.hash.substring(1);

  const copyBtn = document.getElementById('copy-link-btn');
  const statusText = document.getElementById('link-status');
  const guideCard = document.querySelector('.guide-panel');

  // ==========================================================================
  // PEER-TO-PEER MULTIPLAYER ENGINE (With Auto-Retry)
  // ==========================================================================
  let retryCount = 0;
  const maxRetries = 5;

  function connectToHost() {
    statusText.innerText = `Connecting to Host... (Attempt ${retryCount + 1})`;
    connection = peer.connect(targetPeerId);

    connection.on('open', () => {
      setupConnectionListeners();
      statusText.innerText = "🟢 Connected to Host! Game Live.";
    });
  }

  try {
    peer = new Peer();

    peer.on('open', (id) => {
      if (!targetPeerId) {
        // Host side (Player 1 = Defense)
        window.location.hash = id;
        statusText.innerText = "Ready! Copy link and send to Player 2.";
        if (guideCard) guideCard.classList.remove('attack');
      } else {
        // Guest side (Player 2 = Attack)
        if (guideCard) {
          guideCard.classList.add('attack');
          guideCard.querySelector('.guide-header').innerText = "ATTACK";
        }
        connectToHost();
      }
    });

    peer.on('connection', (conn) => {
      connection = conn;
      setupConnectionListeners();
      statusText.innerText = "🟢 Player 2 Connected! Game Live.";
    });

    peer.on('error', (err) => {
      console.error("Multiplayer Connection Error:", err);
      if (err.type === 'peer-unavailable' && targetPeerId && retryCount < maxRetries) {
        retryCount++;
        statusText.innerText = "⚠️ Host layout loading... Retrying connection...";
        setTimeout(connectToHost, 1500);
      } else {
        statusText.innerText = "⚠️ Connection error. Type: " + err.type;
      }
    });

  } catch (error) {
    console.error("PeerJS completely failed to load:", error);
    statusText.innerText = "⚠️ Network initialization failed.";
  }

  // ==========================================================================
  // SHARE LINK
  // ==========================================================================
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(window.location.href).then(() => {
      const oldText = statusText.innerText;
      statusText.innerText = "📋 Link Copied to Clipboard!";
      setTimeout(() => { statusText.innerText = oldText; }, 3000);
    });
  });

  // ==========================================================================
  // NETWORK RECEIVER & SYNC ENGINE
  // ==========================================================================
  function sendNetworkData(payload) {
    if (connection && connection.open) {
      connection.send(payload);
    }
  }

  function setupConnectionListeners() {
    connection.on('data', (data) => {
      const opponentLetter = letters[data.x];
      const opponentNumber = data.y + 1;

      // Handle Mini-Map synchronization events
      if (data.isMiniMap) {
        const targetCell = miniMap.querySelector(`.cell[data-x="${data.x}"][data-y="${data.y}"]`);
        if (!targetCell) return;

        if (data.isNew) {
          // Re-create the dragged token visually on opponent side mini-map
          const remoteToken = document.createElement('div');
          remoteToken.className = `token ${data.color}`;
          remoteToken.setAttribute('draggable', 'true');
          bindTokenDragEvents(remoteToken, false);
          targetCell.appendChild(remoteToken);
        } else if (data.isDelete) {
          const oldCell = miniMap.querySelector(`.cell[data-x="${data.oldX}"][data-y="${data.oldY}"]`);
          if (oldCell && oldCell.children[data.tokenIndex]) {
            oldCell.children[data.tokenIndex].remove();
          }
        } else {
          const oldCell = miniMap.querySelector(`.cell[data-x="${data.oldX}"][data-y="${data.oldY}"]`);
          if (oldCell) {
            const tokenToMove = Array.from(oldCell.children).find(child => child.classList.contains(data.color || 'token'));
            if (tokenToMove) {
              targetCell.appendChild(tokenToMove);
            }
          }
        }
        return; // End Mini-Map update parsing
      }

      // Default Radar Alerts for individual hidden maps
      if (data.isNew) {
        console.log(`📡 RADAR ALERT: Opponent instantiated a token on THEIR board at ${opponentLetter}${opponentNumber}.`);
      } else if (data.isDelete) {
        console.log(`📡 RADAR ALERT: Opponent deleted a token on THEIR board at ${letters[data.oldX]}${data.oldY + 1}.`);
      } else {
        console.log(`📡 RADAR ALERT: Opponent shifted a piece on THEIR map from ${letters[data.oldX]}${data.oldY + 1} to ${opponentLetter}${opponentNumber}.`);
      }
    });

    connection.on('close', () => {
      statusText.innerText = "🔴 Opponent disconnected.";
    });
  }

  // ==========================================================================
  // DRAG BINDINGS
  // ==========================================================================
  function bindTokenDragEvents(token, fromSupplyDepot) {
    token.addEventListener('dragstart', function(event) {
      draggedToken = token;
      isSupplyToken = fromSupplyDepot;
      event.dataTransfer.effectAllowed = 'move';
      setTimeout(() => { token.classList.add('dragging'); }, 1);
    });

    token.addEventListener('dragend', function() {
      token.classList.remove('dragging');
      draggedToken = null;
      isSupplyToken = false;
    });
  }

  // ==========================================================================
  // GRID CELL EVENT CONFIGURATION
  // ==========================================================================
  function configureGridCellEvents(cell, gameX, gameY, isMiniMapBoard) {
    cell.addEventListener('dragover', function(event) {
      event.preventDefault();
      const isIllegalZone = cell.matches('[data-wall-right="true"], [data-wall-bottom="true"], [data-window-right="true"], [data-window-bottom="true"]');
      event.dataTransfer.dropEffect = isIllegalZone ? 'none' : 'move';
    });

    cell.addEventListener('drop', function(event) {
      event.preventDefault();
      if (!draggedToken) return;

      const isWallOrWindow = cell.matches('[data-wall-right="true"], [data-wall-bottom="true"], [data-window-right="true"], [data-window-bottom="true"]');
      if (isWallOrWindow) return;

      // Restrict cross-board dragging (Mini-map tokens stay on mini-map, Main stays on main)
      const sourceIsMiniMap = !!draggedToken.parentElement.closest('#mini-map');
      if (!isSupplyToken && (sourceIsMiniMap !== isMiniMapBoard)) return;

      const colorClass = Array.from(draggedToken.classList).find(c => c !== 'token' && c !== 'dragging') || '';

      if (isSupplyToken) {
        const tokenClone = draggedToken.cloneNode(true);
        tokenClone.classList.remove('dragging');

        bindTokenDragEvents(tokenClone, false);
        cell.appendChild(tokenClone);

        if (isMiniMapBoard) {
          sendNetworkData({ isMiniMap: true, isNew: true, color: colorClass, x: gameX, y: gameY });
          console.log(`Shared Mini-Map updated: Added token at ${letters[gameX]}${gameY + 1}.`);
        } else {
          sendNetworkData({ isNew: true, color: colorClass, x: gameX, y: gameY });
          console.log(`You placed a token at ${letters[gameX]}${gameY + 1}.`);
        }
      } else {
        const oldX = parseInt(draggedToken.parentElement.dataset.x);
        const oldY = parseInt(draggedToken.parentElement.dataset.y);

        cell.appendChild(draggedToken);

        if (isMiniMapBoard) {
          sendNetworkData({ isMiniMap: true, isNew: false, color: colorClass, oldX: oldX, oldY: oldY, x: gameX, y: gameY });
          console.log(`Shared Mini-Map updated: Moved token to ${letters[gameX]}${gameY + 1}.`);
        } else {
          sendNetworkData({ isNew: false, oldX: oldX, oldY: oldY, x: gameX, y: gameY });
          console.log(`You moved your token to ${letters[gameX]}${gameY + 1}.`);
        }
      }
    });
  }

  // ==========================================================================
  // GRID GENERATORS (Simultaneous Twin Build)
  // ==========================================================================
  for (let i = 0; i < totalCells; i++) {
    const col = i % columns;
    const row = Math.floor(i / columns);

    let labelText = '';
    if (row === 0 && col !== 0) labelText = letters[col - 1];
    if (col === 0 && row !== 0) labelText = row;

    const mainCellOrLabel = (row === 0 || col === 0) ? createDiv('label', labelText) : createDiv('cell', '');
    const miniCellOrLabel = (row === 0 || col === 0) ? createDiv('label', labelText) : createDiv('cell', '');

    if (row !== 0 && col !== 0) {
      const gameX = col - 1;
      const gameY = row - 1;
      
      mainCellOrLabel.dataset.x = gameX;
      mainCellOrLabel.dataset.y = gameY;
      miniCellOrLabel.dataset.x = gameX;
      miniCellOrLabel.dataset.y = gameY;

      // Sync map environmental design structures 
      if (gameX === 0 && gameY === 0) {
        mainCellOrLabel.setAttribute('data-wall-right', 'true');
        miniCellOrLabel.setAttribute('data-wall-right', 'true');
      }
      if (gameX === 1 && gameY === 1) {
        mainCellOrLabel.setAttribute('data-window-right', 'true');
        miniCellOrLabel.setAttribute('data-window-right', 'true');
      }

      configureGridCellEvents(mainCellOrLabel, gameX, gameY, false);
      configureGridCellEvents(miniCellOrLabel, gameX, gameY, true);
    }

    board.appendChild(mainCellOrLabel);
    miniMap.appendChild(miniCellOrLabel);
  }

  function createDiv(className, text) {
    const el = document.createElement('div');
    el.className = className;
    el.innerText = text;
    return el;
  }

  // ==========================================================================
  // SUPPLY DEPOT & TRASH BIN
  // ==========================================================================
  const supplyGrid = document.getElementById('supply-grid');
  const trashBin = document.getElementById('trash-bin');
  const supplyItems = ['', 'light-blue', 'dark-blue', 'pink', 'red', '', '', '', '', ''];

  for (let i = 0; i < 10; i++) {
    const slot = document.createElement('div');
    slot.classList.add('supply-slot');
    if (supplyItems[i] !== undefined) {
      const supplyToken = document.createElement('div');
      supplyToken.classList.add('token');
      supplyToken.setAttribute('draggable', 'true');
      if (supplyItems[i]) supplyToken.classList.add(supplyItems[i]);
      bindTokenDragEvents(supplyToken, true);
      slot.appendChild(supplyToken);
    }
    supplyGrid.appendChild(slot);
  }

  trashBin.addEventListener('dragover', function(event) {
    event.preventDefault();
    event.dataTransfer.dropEffect = 'move';
  });

  trashBin.addEventListener('drop', function(event) {
    event.preventDefault();
    if (draggedToken && !isSupplyToken) {
      const oldX = parseInt(draggedToken.parentElement.dataset.x);
      const oldY = parseInt(draggedToken.parentElement.dataset.y);
      const tokenIndex = Array.from(draggedToken.parentElement.children).indexOf(draggedToken);
      const isMiniMapBoard = !!draggedToken.parentElement.closest('#mini-map');

      draggedToken.remove();

      if (isMiniMapBoard) {
        sendNetworkData({ isMiniMap: true, isDelete: true, oldX: oldX, oldY: oldY, tokenIndex: tokenIndex });
      } else {
        sendNetworkData({ isDelete: true, oldX: oldX, oldY: oldY, tokenIndex: tokenIndex });
      }
    }
  });

});
    </script>
